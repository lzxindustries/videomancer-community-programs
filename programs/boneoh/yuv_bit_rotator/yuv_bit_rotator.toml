#
# YUV Bit Rotator Program Configuration
#
# Effect: Per-channel bit rotation (ROL/ROR) directly on YUV video with:
#   - Individual rotation amount per channel (0-10 bits, 10-bit wrap = no effect)
#   - Per-channel wet/dry blend
#   - Global wet/dry blend (applied after per-channel blend)
#   - Global ROL/ROR direction switch
#   - 3-switch dark suppress threshold: Y high-pass (values ≤ threshold → black);
#     U/V notch (values within ±threshold of neutral 512 → neutral chroma)
#   - Bypass switch (last switch, follows Videomancer convention)
#
# Note: operates directly in YUV space - no color conversion.
#   Rotating Y scrambles luminance/brightness.
#   Rotating U/V scrambles chroma (color hue and saturation).

[program]
program_id = "com.peteappleby.yuv_bit_rotator"
program_name = "YUV Bit Rotato"
program_version = "0.1.7"
abi_version = ">=1.0,<2.0"
author = "Pete Appleby"
license = "GPL-3.0"
category = "Video Processing"
description = "Per-channel YUV bit rotation with blend and dark suppress threshold"
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"

# ---------------------------------------------------------------------------
# KNOBS (Rotary Potentiometers)
# ---------------------------------------------------------------------------

# Rotation amount per channel: 0 = no effect, 1-9 = rotate, 10 = no effect (full wrap)

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Y Rotation"
control_mode = "linear"
display_min_value = 0
display_max_value = 10
initial_value = 512
display_float_digits = 0
suffix_label = "bit"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "U Rotation"
control_mode = "linear"
display_min_value = 0
display_max_value = 10
initial_value = 512
display_float_digits = 0
suffix_label = "bit"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "V Rotation"
control_mode = "linear"
display_min_value = 0
display_max_value = 10
initial_value = 512
display_float_digits = 0
suffix_label = "bit"

# Per-channel wet/dry blend: 0% = fully dry (original), 100% = fully processed

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Y Blend"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 1023
display_float_digits = 1
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "U Blend"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 1023
display_float_digits = 1
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "V Blend"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 1023
display_float_digits = 1
suffix_label = "%"

# ---------------------------------------------------------------------------
# SWITCHES (Toggle Switches)
# ---------------------------------------------------------------------------

# Rotation direction: applies globally to all three channels
[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Direction"
value_labels = ["Left", "Right"]
initial_value_label = "Left"

# Dark suppress threshold: 3 switches = 8 cutoff levels.
# Y channel: high-pass  — values at or below threshold output 0 (black).
# U/V channels: notch   — values within ±threshold of neutral 512 output 512 (neutral chroma).
# Cutoff S1 (hardware S2) is the highest-impact switch; Cutoff S3 is a fine step.
# S1=Off S2=Off S3=Off -> suppress nothing  (all pass)
# S1=Off S2=Off S3=On  -> Y:suppress 0–3;   UV:±3   (slight: removes noise floor)
# S1=Off S2=On  S3=Off -> Y:suppress 0–15;  UV:±15  (mild)
# S1=Off S2=On  S3=On  -> Y:suppress 0–31;  UV:±31  (moderate)
# S1=On  S2=Off S3=Off -> Y:suppress 0–63;  UV:±63  (strong)
# S1=On  S2=Off S3=On  -> Y:suppress 0–127; UV:±127 (heavy)
# S1=On  S2=On  S3=Off -> Y:suppress 0–255; UV:±255 (very heavy)
# S1=On  S2=On  S3=On  -> Y:suppress 0–511; UV:±511 (extreme)

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Cutoff S1"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Cutoff S2"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Cutoff S3"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# Bypass: last switch by Videomancer convention
[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Process", "Bypass"]
initial_value_label = "Process"

# ---------------------------------------------------------------------------
# SLIDER (Linear Potentiometer)
# ---------------------------------------------------------------------------

# Global blend: applied after per-channel blends
# 0% = fully dry (original signal)
# 100% = fully processed (per-channel blend outputs passed through)

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Global Blend"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 1023
display_float_digits = 1
suffix_label = "%"
